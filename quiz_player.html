<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>医学词汇测验 · 即时反馈与正确率统计</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 12px 20px 12px;
        }
        /* Sticky header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 12px 16px;
            margin: 0 -12px 16px -12px;
        }
        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
        }
        .title-section {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 6px;
        }
        .chapter-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #2c7a4d;
        }
        .source-badge {
            font-size: 0.7rem;
            background: #e8f0fe;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
            color: #2c7a4d;
            font-weight: normal;
        }
        .subtitle {
            font-size: 0.8rem;
            color: #5a6874;
            margin-top: 2px;
        }
        .stats-summary {
            background: #f8f9fc;
            border-radius: 20px;
            padding: 8px 12px;
            margin-bottom: 12px;
            font-size: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
            border: 1px solid #e9ecef;
        }
        .stats-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-weight: 500;
        }
        .stats-numbers span {
            background: white;
            padding: 2px 8px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .stat-correct { color: #2c7a4d; background: #e9f7ef; }
        .stat-incorrect { color: #d9534f; background: #fdf0ef; }
        .stat-answered { color: #2c6e9e; background: #e8f0fe; }
        .stat-unanswered { color: #8c9aa8; background: #f0f2f5; }
        .stat-rate { font-weight: 700; color: #2c7a4d; background: #eaf9e8; }
        .settings-toggle {
            background: #f0f2f5;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
        }
        .settings-panel {
            background: #f9fafc;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            display: none;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            scroll-margin-top: 80px;
        }
        .settings-panel.open {
            display: flex;
        }
        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 140px;
        }
        .setting-group label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c3e4e;
        }
        select, .setting-group input {
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid #ddd;
            background: white;
            font-size: 0.85rem;
        }
        .btn-small {
            background: #2c7a4d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-small-outline {
            background: transparent;
            border: 1px solid #2c7a4d;
            color: #2c7a4d;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c7a4d;
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 0.85rem;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .toast.show {
            opacity: 1;
        }
        .question-grid { display: flex; flex-direction: column; gap: 20px; }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .question-header {
            padding: 16px 20px 12px 20px;
            border-bottom: 1px solid #e9eef3;
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        .tag {
            background: #ecf5ff;
            color: #409eff;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .difficulty-badge {
            background: #f0f2f5;
            color: #8c9aa8;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .question-title {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.4;
            margin: 0;
            flex: 1;
        }
        .options { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
        .option {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            padding: 8px 12px;
            border-radius: 10px;
        }
        .option:hover { background-color: #f5f7fa; }
        .option input { margin-top: 2px; flex-shrink: 0; transform: scale(1.1); }
        .option label { flex: 1; cursor: pointer; color: #2c3e4e; }
        .option .prefix { font-weight: 600; color: #409eff; width: 28px; flex-shrink: 0; }
        .feedback {
            background: #f9fafc;
            border-top: 1px solid #e9eef3;
            padding: 16px 20px;
            font-size: 0.9rem;
        }
        .correct-answer { color: #2c7a4d; font-weight: 500; }
        .your-answer { color: #d9534f; }
        .analysis {
            margin-top: 12px;
            color: #5a6874;
            background: #fff6e0;
            padding: 12px 16px;
            border-radius: 12px;
            white-space: pre-wrap;
            font-size: 0.85rem;
        }
        .btn-check {
            background-color: #2c7a4d;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 8px;
        }
        .status {
            display: inline-block;
            margin-left: 16px;
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 30px;
            background: #f0f2f5;
        }
        .status.answered { background: #e3f7ec; color: #2c7a4d; }
        .error-box {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.85rem;
        }
        footer {
            text-align: center;
            margin-top: 32px;
            font-size: 0.75rem;
            color: #8c9aa8;
            padding-bottom: 20px;
        }
        @media (max-width: 700px) {
            .container { padding: 0 8px 16px 8px; }
            .header { padding: 10px 12px; margin: 0 -8px 16px -8px; }
            .title-section { flex-direction: column; align-items: flex-start; }
            .stats-numbers { gap: 8px; }
            .stats-numbers span { font-size: 0.7rem; padding: 2px 6px; }
            .question-header { flex-direction: column; align-items: flex-start; }
            .status { margin-left: 0; margin-top: 6px; }
            .option { padding: 8px 10px; }
            .btn-check { width: 100%; text-align: center; }
            .settings-panel { flex-direction: column; align-items: stretch; }
            .setting-group { width: 100%; }
            .toast { white-space: normal; text-align: center; width: 90%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-inner">
            <div class="title-section">
                <div>
                    <div class="chapter-title" id="chapterTitle">
                        加载中...
                        <span class="source-badge" id="sourceBadge"></span>
                    </div>
                    <div class="subtitle" id="subtitle"></div>
                </div>
            </div>
            <!-- 统计摘要区（中文直观统计） -->
            <div class="stats-summary" id="statsSummary">
                <div class="stats-numbers">
                    <span>📋 总题数: <strong id="totalCount">0</strong></span>
                    <span class="stat-answered">✏️ 已答: <strong id="answeredCount">0</strong></span>
                    <span class="stat-correct">✅ 正确: <strong id="correctCount">0</strong></span>
                    <span class="stat-incorrect">❌ 错误: <strong id="incorrectCount">0</strong></span>
                    <span class="stat-unanswered">⏳ 未答: <strong id="unansweredCount">0</strong></span>
                </div>
                <div class="stat-rate">📊 正确率: <strong id="correctRate">0%</strong></div>
            </div>
            <button class="settings-toggle" id="settingsToggle">⚙️ 筛选 & 设置</button>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div class="setting-group">
            <label>🔢 题目数量</label>
            <select id="questionCountSelect">
                <option value="all">全部题目</option>
                <option value="5">5 题</option>
                <option value="10">10 题</option>
                <option value="20">20 题</option>
                <option value="30">30 题</option>
                <option value="50">50 题</option>
            </select>
        </div>
        <div class="setting-group">
            <label>🎲 随机顺序</label>
            <label style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="randomizeCheckbox"> 随机打乱题目顺序
            </label>
        </div>
        <div class="setting-group">
            <button class="btn-small" id="applySettingsBtn">应用筛选</button>
            <button class="btn-small-outline" id="resetProgressBtn">重置进度</button>
        </div>
    </div>

    <div id="quizContainer" class="question-grid">
        <div style="text-align: center; padding: 60px; background: white; border-radius: 20px;">
            ⏳ 正在加载，请稍候...
        </div>
    </div>
    <footer>✨ <strong>单选</strong>题目：点击选项后<strong>立即显示答案+解析</strong>，并计入正确/错误统计；<strong>多选题</strong>需点击「核对答案」后计入统计。<br>📊 统计面板显示实时正确率与答题明细。</footer>
</div>
<div id="toastMessage" class="toast"></div>

<script>
    // ---------- Helper functions ----------
    function unescapeHtml(html) {
        const div = document.createElement('div');
        div.innerHTML = html;
        return div.textContent || div.innerText || '';
    }

    function showToast(message, duration = 2000) {
        const toast = document.getElementById('toastMessage');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, duration);
    }

    function parseJsonContent(jsonObj) {
        try {
            let studentArray = null;
            if (jsonObj.data && jsonObj.data.record && jsonObj.data.record.extJson && jsonObj.data.record.extJson.studentQuestionArray) {
                studentArray = jsonObj.data.record.extJson.studentQuestionArray;
            } else if (jsonObj.record && jsonObj.record.extJson && jsonObj.record.extJson.studentQuestionArray) {
                studentArray = jsonObj.record.extJson.studentQuestionArray;
            } else if (jsonObj.extJson && jsonObj.extJson.studentQuestionArray) {
                studentArray = jsonObj.extJson.studentQuestionArray;
            } else if (jsonObj.studentQuestionArray) {
                studentArray = jsonObj.studentQuestionArray;
            }
            return studentArray;
        } catch(e) {
            console.error(e);
            return null;
        }
    }

    function getSourceFromPath(filePath) {
        const known = ["Saunders", "Uworld", "医学术语", "患者需求"];
        for (const src of known) {
            if (filePath.includes(src)) return src;
        }
        return "";
    }

    function getDifficultyLabel(diffStr) {
        if (!diffStr) return "通用";
        if (diffStr.includes("Analyzing")) return "分析 (Analyzing)";
        if (diffStr.includes("Applying")) return "应用 (Applying)";
        if (diffStr.includes("Understanding")) return "理解 (Understanding)";
        if (diffStr.includes("Evaluating")) return "评价 (Evaluating)";
        if (diffStr.includes("中级")) return "中级";
        return diffStr.split('-').pop() || diffStr;
    }

    let fullQuestions = [];
    let currentQuestions = [];
    let userAnswers = [];      // 存储用户选择的选项id (单选存string，多选存array)
    let answerStatus = [];     // 是否已经核对/判定 (用于显示解析及计入正确/错误统计)
    let currentFilePath = "";

    // 判断某个题目的答案是否正确 (基于已核对状态和用户选择)
    function isQuestionCorrect(q, idx) {
        if (!answerStatus[idx]) return false;   // 尚未核对/判定，不计入正确/错误
        const type = q.type;
        const options = q.optionList || [];
        const correctIds = options.filter(opt => opt.isRight === "1").map(opt => opt.id);
        if (type === '3') {
            // 排序题目前无用户交互，默认不计入统计，返回false
            return false;
        } else if (type === '1') {
            // 多选题：用户选择数组是否与正确选项id集合完全一致（无序，忽略顺序）
            const selected = userAnswers[idx] || [];
            if (!Array.isArray(selected)) return false;
            if (selected.length !== correctIds.length) return false;
            const sortedSelected = [...selected].sort();
            const sortedCorrect = [...correctIds].sort();
            return JSON.stringify(sortedSelected) === JSON.stringify(sortedCorrect);
        } else {
            // 单选题 (type !== '1' && !=='3')
            const selectedId = userAnswers[idx];
            if (!selectedId) return false;
            return correctIds.length === 1 && correctIds[0] === selectedId;
        }
    }

    // 计算完整统计 (总数, 已答, 正确, 错误, 未答)
    function computeStatistics() {
        let total = currentQuestions.length;
        let answered = 0;      // 有选择内容 (单选有值，多选length>0)
        let correct = 0;
        let incorrect = 0;
        let unanswered = 0;
        for (let i = 0; i < currentQuestions.length; i++) {
            const q = currentQuestions[i];
            const type = q.type;
            let hasSelection = false;
            if (type === '3') {
                // 排序题忽略不计入统计（不参与正确率）
                continue;
            } else if (type === '1') {
                const sel = userAnswers[i];
                hasSelection = (sel && Array.isArray(sel) && sel.length > 0);
            } else {
                const sel = userAnswers[i];
                hasSelection = (sel != null && sel !== '');
            }
            if (hasSelection) answered++;
            // 只有已核对/判定的题目才计入正确/错误统计
            if (answerStatus[i] && hasSelection) {
                if (isQuestionCorrect(q, i)) {
                    correct++;
                } else {
                    incorrect++;
                }
            } else if (!hasSelection) {
                unanswered++;
            }
        }
        // 未答数量 = 总数 - 已答数量
        unanswered = total - answered;
        return { total, answered, correct, incorrect, unanswered };
    }

    // 更新UI统计 (进度条已移除，只更新简要统计)
    function updateStatsAndProgress() {
        if (!currentQuestions.length) {
            document.getElementById('totalCount').innerText = '0';
            document.getElementById('answeredCount').innerText = '0';
            document.getElementById('correctCount').innerText = '0';
            document.getElementById('incorrectCount').innerText = '0';
            document.getElementById('unansweredCount').innerText = '0';
            document.getElementById('correctRate').innerText = '0%';
            return;
        }
        const stats = computeStatistics();
        const total = stats.total;
        const correct = stats.correct;
        const rate = total === 0 ? 0 : (correct / total) * 100;
        document.getElementById('totalCount').innerText = total;
        document.getElementById('answeredCount').innerText = stats.answered;
        document.getElementById('correctCount').innerText = correct;
        document.getElementById('incorrectCount').innerText = stats.incorrect;
        document.getElementById('unansweredCount').innerText = stats.unanswered;
        document.getElementById('correctRate').innerHTML = `${Math.round(rate)}%`;
    }

    function saveProgress() {
        if (!currentFilePath || !currentQuestions.length) return;
        const indices = currentQuestions.map(q => fullQuestions.indexOf(q));
        const data = {
            userAnswers: userAnswers,
            answerStatus: answerStatus,
            currentQuestionsIndices: indices
        };
        localStorage.setItem(getStorageKey(), JSON.stringify(data));
    }

    function getStorageKey() {
        return `quiz_progress_${currentFilePath.replace(/[\\/]/g, '_')}`;
    }

    function loadProgress() {
        const saved = localStorage.getItem(getStorageKey());
        if (!saved) return false;
        try {
            const data = JSON.parse(saved);
            const savedIndices = data.currentQuestionsIndices;
            if (savedIndices && savedIndices.length === currentQuestions.length) {
                let valid = true;
                for (let i = 0; i < savedIndices.length; i++) {
                    if (fullQuestions[savedIndices[i]] !== currentQuestions[i]) {
                        valid = false;
                        break;
                    }
                }
                if (valid) {
                    userAnswers = data.userAnswers;
                    answerStatus = data.answerStatus;
                    while (userAnswers.length < currentQuestions.length) userAnswers.push(null);
                    while (answerStatus.length < currentQuestions.length) answerStatus.push(false);
                    for (let i = 0; i < currentQuestions.length; i++) {
                        if (currentQuestions[i].type === '1' && (!userAnswers[i] || !Array.isArray(userAnswers[i]))) {
                            userAnswers[i] = [];
                        }
                    }
                    return true;
                }
            }
        } catch(e) {}
        return false;
    }

    function renderQuiz() {
        const container = document.getElementById('quizContainer');
        if (!currentQuestions.length) {
            container.innerHTML = '<div class="error-box">⚠️ 没有题目。请检查筛选条件。</div>';
            updateStatsAndProgress();
            return;
        }
        let html = '';
        currentQuestions.forEach((q, idx) => {
            const qType = q.type;
            const options = q.optionList || [];
            const isMulti = (qType === '1');
            const isRadio = (!isMulti && qType !== '3');
            const userSel = userAnswers[idx] || (isMulti ? [] : null);
            const statusClass = (userSel && (Array.isArray(userSel) ? userSel.length > 0 : userSel !== null)) ? 'answered' : '';
            const statusText = (userSel && (Array.isArray(userSel) ? userSel.length > 0 : userSel !== null)) ? '已回答' : '未答';
            const isCorrectShown = answerStatus[idx] || false;
            let selectedId = (!isMulti && userSel) ? userSel : null;
            let selectedIds = (isMulti && Array.isArray(userSel)) ? userSel : [];
            const difficultyLabel = getDifficultyLabel(q.difficulty);

            html += `<div class="card" data-qidx="${idx}">`;
            html += `<div class="question-header">
                        <span class="tag">${isMulti ? '多选题' : (qType === '3' ? '排序题' : '单选题')}</span>
                        <span class="difficulty-badge">📊 ${difficultyLabel}</span>
                        <div class="question-title">${unescapeHtml(q.content) || '无题目'}</div>
                        <span class="status ${statusClass}">${statusText}</span>
                     </div>`;
            html += `<div class="options" id="options-${idx}">`;
            
            if (qType === '3') {
                html += `<div style="background:#fef5e7; padding:12px; border-radius:12px;">
                            <strong>📌 排序题：</strong> 下面列出原有顺序，可参考解析。<br/><ul>`;
                options.forEach((opt, optIdx) => {
                    html += `<li>${optIdx+1}. ${unescapeHtml(opt.content)}</li>`;
                });
                html += `</ul></div>`;
                if (isCorrectShown) {
                    let correctOrder = [...options].sort((a,b)=> parseInt(a.isRight) - parseInt(b.isRight)).map(o=>o.content).join(' → ');
                    html += `<div class="analysis"><strong>正确顺序：</strong> ${correctOrder}<br/><strong>解析：</strong> ${unescapeHtml(q.textAnalysis || '无解析')}</div>`;
                }
            } else {
                // 单选/多选选项
                options.forEach((opt, optIdx) => {
                    const letter = String.fromCharCode(65 + optIdx);
                    const isChecked = (isMulti ? selectedIds.includes(opt.id) : selectedId === opt.id);
                    const inputType = isMulti ? 'checkbox' : 'radio';
                    const inputName = `q${idx}`;
                    html += `<div class="option" data-opt-id="${opt.id}">
                                <span class="prefix">${letter}.</span>
                                <input type="${inputType}" name="${inputName}" value="${opt.id}" id="opt_${idx}_${optIdx}" ${isChecked ? 'checked' : ''}>
                                <label for="opt_${idx}_${optIdx}">${unescapeHtml(opt.content)}</label>
                             </div>`;
                });
                
                // 显示核对按钮：多选题永远显示；单选题仅在未显示解析时显示（立即反馈后按钮隐藏）
                if (isMulti) {
                    html += `<div style="margin-top: 12px; text-align: right;">
                                <button class="btn-check" data-idx="${idx}">✓ 核对答案</button>
                             </div>`;
                } else if (isRadio && !isCorrectShown) {
                    html += `<div style="margin-top: 12px; text-align: right;">
                                <button class="btn-check" data-idx="${idx}">✓ 核对答案</button>
                             </div>`;
                }
                
                if (isCorrectShown) {
                    let correctAnswersText = options.filter(opt => opt.isRight === "1").map(opt => {
                        let letterOpt = String.fromCharCode(65 + options.findIndex(o=>o.id===opt.id));
                        return `${letterOpt}. ${unescapeHtml(opt.content)}`;
                    }).join(' ;  ');
                    let userAnswersText = '';
                    if (isMulti) {
                        let selectedOpts = options.filter(opt => selectedIds.includes(opt.id)).map(opt => {
                            let letterOpt = String.fromCharCode(65 + options.findIndex(o=>o.id===opt.id));
                            return `${letterOpt}. ${unescapeHtml(opt.content)}`;
                        });
                        userAnswersText = selectedOpts.length ? selectedOpts.join(' ; ') : '未选任何选项';
                    } else {
                        let selectedOpt = options.find(opt => opt.id === selectedId);
                        userAnswersText = selectedOpt ? `${String.fromCharCode(65 + options.findIndex(o=>o.id===selectedId))}. ${unescapeHtml(selectedOpt.content)}` : '未选';
                    }
                    html += `<div class="feedback">
                                <div class="correct-answer">✅ 正确答案： ${correctAnswersText}</div>
                                <div class="your-answer">📝 你的答案： ${userAnswersText}</div>
                                <div class="analysis">📖 解析： ${unescapeHtml(q.textAnalysis || '无解析')}</div>
                            </div>`;
                }
            }
            html += `</div></div>`;
        });
        container.innerHTML = html;

        // 绑定事件
        currentQuestions.forEach((q, idx) => {
            if (q.type === '3') return;
            const optionsDiv = document.getElementById(`options-${idx}`);
            if (!optionsDiv) return;
            const inputs = optionsDiv.querySelectorAll('input');
            const isMulti = (q.type === '1');
            const isRadio = (!isMulti && q.type !== '3');
            
            inputs.forEach(input => {
                input.addEventListener('change', () => {
                    if (isMulti) {
                        let current = userAnswers[idx] || [];
                        const val = input.value;
                        if (input.checked) {
                            if (!current.includes(val)) current.push(val);
                        } else {
                            current = current.filter(v => v !== val);
                        }
                        userAnswers[idx] = current;
                        // 多选改动后清除核对状态，隐藏解析
                        if (answerStatus[idx]) {
                            answerStatus[idx] = false;
                        }
                        const statusSpan = document.querySelector(`.card[data-qidx="${idx}"] .status`);
                        if (statusSpan) {
                            const hasAnswer = (userAnswers[idx]?.length > 0);
                            statusSpan.innerText = hasAnswer ? '已回答' : '未答';
                            if (hasAnswer) statusSpan.classList.add('answered');
                            else statusSpan.classList.remove('answered');
                        }
                        updateStatsAndProgress();
                        saveProgress();
                        renderQuiz();   // 重新渲染以移除反馈区域
                    } 
                    else if (isRadio) {
                        if (input.checked) {
                            userAnswers[idx] = input.value;
                        }
                        // 单选立即核对（自动显示解析，计入统计）
                        answerStatus[idx] = true;
                        updateStatsAndProgress();
                        saveProgress();
                        renderQuiz();   // 立即刷新显示解析
                    }
                });
            });
            
            const checkBtn = document.querySelector(`.btn-check[data-idx="${idx}"]`);
            if (checkBtn) {
                checkBtn.addEventListener('click', () => {
                    if (!answerStatus[idx]) {
                        answerStatus[idx] = true;
                        updateStatsAndProgress();
                        saveProgress();
                        renderQuiz();
                    } else {
                        // 若已核对，轻提示但不影响
                        if (isMulti) {
                            // 多选重新核对更新统计（基于当前选项重算正确性）
                            updateStatsAndProgress();
                            saveProgress();
                            renderQuiz();
                        }
                    }
                });
            }
        });
        updateStatsAndProgress();
        saveProgress();
    }

    function applyFilters() {
        if (!fullQuestions.length) return;
        let filtered = [...fullQuestions];
        const countVal = document.getElementById('questionCountSelect').value;
        if (countVal !== 'all') {
            const limit = parseInt(countVal);
            if (filtered.length > limit) filtered = filtered.slice(0, limit);
        }
        if (document.getElementById('randomizeCheckbox').checked) {
            for (let i = filtered.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
            }
        }
        currentQuestions = filtered;
        userAnswers = new Array(currentQuestions.length).fill(null);
        answerStatus = new Array(currentQuestions.length).fill(false);
        for (let i = 0; i < currentQuestions.length; i++) {
            if (currentQuestions[i].type === '1') userAnswers[i] = [];
        }
        // 尝试加载匹配的进度
        const saved = localStorage.getItem(getStorageKey());
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (data.currentQuestionsIndices && data.currentQuestionsIndices.length === currentQuestions.length) {
                    let match = true;
                    for (let i = 0; i < currentQuestions.length; i++) {
                        if (fullQuestions[data.currentQuestionsIndices[i]] !== currentQuestions[i]) {
                            match = false;
                            break;
                        }
                    }
                    if (match) {
                        userAnswers = data.userAnswers;
                        answerStatus = data.answerStatus;
                        for (let i = 0; i < currentQuestions.length; i++) {
                            if (currentQuestions[i].type === '1' && (!userAnswers[i] || !Array.isArray(userAnswers[i]))) {
                                userAnswers[i] = [];
                            }
                        }
                    }
                }
            } catch(e) {}
        }
        renderQuiz();
        document.getElementById('settingsPanel').classList.remove('open');
        showToast('✅ 筛选已应用，统计已更新');
    }

    function resetProgress() {
        if (!currentQuestions.length) return;
        localStorage.removeItem(getStorageKey());
        userAnswers = new Array(currentQuestions.length).fill(null);
        answerStatus = new Array(currentQuestions.length).fill(false);
        for (let i = 0; i < currentQuestions.length; i++) {
            if (currentQuestions[i].type === '1') userAnswers[i] = [];
        }
        renderQuiz();
        document.getElementById('settingsPanel').classList.remove('open');
        showToast('🔄 进度已重置，统计归零');
    }

    // 主加载
    const urlParams = new URLSearchParams(window.location.search);
    const fileParam = urlParams.get('file');
    if (!fileParam) {
        document.getElementById('quizContainer').innerHTML = '<div class="error-box">❌ 未提供文件参数。请通过 ?file=相对路径 打开此页面。</div>';
        document.getElementById('chapterTitle').innerText = '错误';
    } else {
        currentFilePath = decodeURIComponent(fileParam);
        fetch(currentFilePath)
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                const questions = parseJsonContent(data);
                if (!questions || questions.length === 0) throw new Error('没有题目');
                fullQuestions = questions;
                applyFilters();
                const displayName = currentFilePath.replace(/\.json$/i, '').split('/').pop();
                const source = getSourceFromPath(currentFilePath);
                document.getElementById('chapterTitle').innerHTML = `${displayName} <span class="source-badge">${source}</span>`;
                let sub = data.parentCategory || (data.originalData?.parentCategory) || (data.data?.chapterName) || '';
                document.getElementById('subtitle').innerText = sub ? `📁 ${sub}` : '';
            })
            .catch(err => {
                console.error(err);
                document.getElementById('quizContainer').innerHTML = `<div class="error-box"><strong>❌ 加载失败</strong><br>文件: ${currentFilePath}<br>错误: ${err.message}</div>`;
                document.getElementById('chapterTitle').innerHTML = `加载失败 <span class="source-badge"></span>`;
            });
    }

    // UI 事件
    document.getElementById('settingsToggle').addEventListener('click', () => {
        const panel = document.getElementById('settingsPanel');
        const isOpen = panel.classList.contains('open');
        if (!isOpen) {
            panel.classList.add('open');
            setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
        } else {
            panel.classList.remove('open');
        }
    });
    document.getElementById('applySettingsBtn').addEventListener('click', applyFilters);
    document.getElementById('resetProgressBtn').addEventListener('click', resetProgress);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>医学词汇测验 · 收藏复习 & 正确率统计</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 12px 20px 12px;
        }
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 12px 16px;
            margin: 0 -12px 16px -12px;
        }
        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
        }
        .title-section {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 6px;
        }
        .chapter-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #2c7a4d;
        }
        .source-badge {
            font-size: 0.7rem;
            background: #e8f0fe;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
            color: #2c7a4d;
            font-weight: normal;
        }
        .subtitle {
            font-size: 0.8rem;
            color: #5a6874;
            margin-top: 2px;
        }
        .stats-summary {
            background: #f8f9fc;
            border-radius: 20px;
            padding: 8px 12px;
            margin-bottom: 12px;
            font-size: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
            border: 1px solid #e9ecef;
        }
        .stats-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-weight: 500;
        }
        .stats-numbers span {
            background: white;
            padding: 2px 8px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .stat-correct { color: #2c7a4d; background: #e9f7ef; }
        .stat-incorrect { color: #d9534f; background: #fdf0ef; }
        .stat-answered { color: #2c6e9e; background: #e8f0fe; }
        .stat-unanswered { color: #8c9aa8; background: #f0f2f5; }
        .stat-rate { font-weight: 700; color: #2c7a4d; background: #eaf9e8; }
        .completion-badge {
            background: #2c7a4d;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .settings-toggle {
            background: #f0f2f5;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
        }
        .settings-panel {
            background: #f9fafc;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            display: none;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            scroll-margin-top: 80px;
        }
        .settings-panel.open { display: flex; }
        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 140px;
        }
        .setting-group label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c3e4e;
        }
        select, .setting-group input {
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid #ddd;
            background: white;
            font-size: 0.85rem;
        }
        .btn-small {
            background: #2c7a4d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-small-outline {
            background: transparent;
            border: 1px solid #2c7a4d;
            color: #2c7a4d;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c7a4d;
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 0.85rem;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .toast.show { opacity: 1; }
        .question-grid { display: flex; flex-direction: column; gap: 20px; }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .question-header {
            padding: 16px 20px 12px 20px;
            border-bottom: 1px solid #e9eef3;
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        .tag {
            background: #ecf5ff;
            color: #409eff;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .difficulty-badge {
            background: #f0f2f5;
            color: #8c9aa8;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .question-title {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.4;
            margin: 0;
            flex: 1;
        }
        .save-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 30px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .save-btn.saved { color: #f5b042; text-shadow: 0 0 2px rgba(0,0,0,0.1); }
        .save-btn:not(.saved) { color: #aaa; }
        .save-btn:hover { background: #f0f2f5; }
        .options { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
        .option {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            padding: 8px 12px;
            border-radius: 10px;
        }
        .option:hover { background-color: #f5f7fa; }
        .option input { margin-top: 2px; flex-shrink: 0; transform: scale(1.1); }
        .option label { flex: 1; cursor: pointer; color: #2c3e4e; }
        .option .prefix { font-weight: 600; color: #409eff; width: 28px; flex-shrink: 0; }
        .feedback {
            background: #f9fafc;
            border-top: 1px solid #e9eef3;
            padding: 16px 20px;
            font-size: 0.9rem;
        }
        .correct-answer { color: #2c7a4d; font-weight: 500; }
        .your-answer-incorrect { color: #d9534f; }
        .your-answer-correct { color: #2c7a4d; font-weight: 500; }
        .analysis {
            margin-top: 12px;
            color: #5a6874;
            background: #fff6e0;
            padding: 12px 16px;
            border-radius: 12px;
            white-space: pre-wrap;
            font-size: 0.85rem;
        }
        .btn-check {
            background-color: #2c7a4d;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 8px;
        }
        .status {
            display: inline-block;
            margin-left: 16px;
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 30px;
            background: #f0f2f5;
        }
        .status.answered { background: #e3f7ec; color: #2c7a4d; }
        .error-box {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.85rem;
        }
        footer {
            text-align: center;
            margin-top: 32px;
            font-size: 0.75rem;
            color: #8c9aa8;
            padding-bottom: 20px;
        }
        @media (max-width: 700px) {
            .container { padding: 0 8px 16px 8px; }
            .header { padding: 10px 12px; margin: 0 -8px 16px -8px; }
            .title-section { flex-direction: column; align-items: flex-start; }
            .stats-numbers { gap: 8px; }
            .stats-numbers span { font-size: 0.7rem; padding: 2px 6px; }
            .question-header { flex-direction: column; align-items: flex-start; }
            .status { margin-left: 0; margin-top: 6px; }
            .option { padding: 8px 10px; }
            .btn-check { width: 100%; text-align: center; }
            .settings-panel { flex-direction: column; align-items: stretch; }
            .setting-group { width: 100%; }
            .toast { white-space: normal; text-align: center; width: 90%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-inner">
            <div class="title-section">
                <div>
                    <div class="chapter-title" id="chapterTitle">加载中...<span class="source-badge" id="sourceBadge"></span></div>
                    <div class="subtitle" id="subtitle"></div>
                </div>
            </div>
            <div class="stats-summary" id="statsSummary">
                <div class="stats-numbers">
                    <span>📋 总题数: <strong id="totalCount">0</strong></span>
                    <span class="stat-answered">✏️ 已答: <strong id="answeredCount">0</strong></span>
                    <span class="stat-correct">✅ 正确: <strong id="correctCount">0</strong></span>
                    <span class="stat-incorrect">❌ 错误: <strong id="incorrectCount">0</strong></span>
                    <span class="stat-unanswered">⏳ 未答: <strong id="unansweredCount">0</strong></span>
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="stat-rate">📊 正确率: <strong id="correctRate">0%</strong></div>
                    <div id="completionBadge" class="completion-badge" style="display: none;">🏆 本章已完成</div>
                </div>
            </div>
            <button class="settings-toggle" id="settingsToggle">⚙️ 筛选 & 设置</button>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div class="setting-group">
            <label>🔢 题目数量</label>
            <select id="questionCountSelect">
                <option value="all">全部题目</option>
                <option value="5">5 题</option>
                <option value="10">10 题</option>
                <option value="20">20 题</option>
                <option value="30">30 题</option>
                <option value="50">50 题</option>
            </select>
        </div>
        <div class="setting-group">
            <label>🎲 随机顺序</label>
            <label style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="randomizeCheckbox"> 随机打乱题目顺序
            </label>
        </div>
        <div class="setting-group">
            <label>📚 收藏复习</label>
            <label style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="onlySavedCheckbox"> 仅练习收藏题目
            </label>
            <button class="btn-small-outline" id="clearSavedBtn" style="margin-top: 4px;">🗑️ 清除所有收藏</button>
        </div>
        <div class="setting-group">
            <button class="btn-small" id="applySettingsBtn">应用筛选</button>
            <button class="btn-small-outline" id="resetProgressBtn">重置进度</button>
        </div>
    </div>

    <div id="quizContainer" class="question-grid"><div style="text-align: center; padding: 60px; background: white; border-radius: 20px;">⏳ 正在加载，请稍候...</div></div>
    <footer>✨ <strong>单选</strong>题目：只有<strong>第一次选择的答案</strong>计入正确率统计。<br>⭐ 点击题目旁的星星可收藏题目，用于日后集中复习。</footer>
</div>
<div id="toastMessage" class="toast"></div>

<script>
    function unescapeHtml(html) {
        const div = document.createElement('div');
        div.innerHTML = html;
        return div.textContent || div.innerText || '';
    }
    function showToast(message, duration = 2000) {
        const toast = document.getElementById('toastMessage');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), duration);
    }
    function parseJsonContent(jsonObj) {
        try {
            let arr = null;
            if (jsonObj.data?.record?.extJson?.studentQuestionArray) arr = jsonObj.data.record.extJson.studentQuestionArray;
            else if (jsonObj.record?.extJson?.studentQuestionArray) arr = jsonObj.record.extJson.studentQuestionArray;
            else if (jsonObj.extJson?.studentQuestionArray) arr = jsonObj.extJson.studentQuestionArray;
            else if (jsonObj.studentQuestionArray) arr = jsonObj.studentQuestionArray;
            return arr;
        } catch(e) { return null; }
    }
    function getSourceFromPath(p) {
        for (const src of ["Saunders","Uworld","医学术语","患者需求"]) if (p.includes(src)) return src;
        return "";
    }
    function getDifficultyLabel(d) {
        if (!d) return "通用";
        if (d.includes("Analyzing")) return "分析 (Analyzing)";
        if (d.includes("Applying")) return "应用 (Applying)";
        if (d.includes("Understanding")) return "理解 (Understanding)";
        if (d.includes("Evaluating")) return "评价 (Evaluating)";
        if (d.includes("中级")) return "中级";
        return d.split('-').pop() || d;
    }

    let fullQuestions = [];
    let currentQuestions = [];
    let fullUserAnswers = [];
    let fullAnswerStatus = [];
    let currentUserAnswers = [];
    let currentAnswerStatus = [];
    let currentFilePath = "";
    
    // 收藏功能
    function getSavedKey() { return `saved_questions_${currentFilePath.replace(/[\\/]/g, '_')}`; }
    function loadSavedQuestionIds() {
        const saved = localStorage.getItem(getSavedKey());
        if (saved) {
            try { return JSON.parse(saved); } catch(e) { return []; }
        }
        return [];
    }
    function saveQuestionIds(ids) { localStorage.setItem(getSavedKey(), JSON.stringify(ids)); }
    function isQuestionSaved(questionId) { return loadSavedQuestionIds().includes(questionId); }
    function toggleSavedQuestion(questionId) {
        let saved = loadSavedQuestionIds();
        if (saved.includes(questionId)) {
            saved = saved.filter(id => id !== questionId);
            showToast(`⭐ 已从收藏中移除`, 1000);
        } else {
            saved.push(questionId);
            showToast(`📌 已添加到“仅练习收藏题目”列表`, 1500);
        }
        saveQuestionIds(saved);
        const onlySaved = document.getElementById('onlySavedCheckbox').checked;
        if (onlySaved) applyFilters();
        else renderQuiz();
    }
    function clearAllSaved() {
        saveQuestionIds([]);
        showToast(`🗑️ 已清除所有收藏题目`, 1500);
        const onlySaved = document.getElementById('onlySavedCheckbox').checked;
        if (onlySaved) applyFilters();
        else renderQuiz();
    }
    
    // 进度存储
    function getStorageKey() { return `quiz_progress_${currentFilePath.replace(/[\\/]/g, '_')}`; }
    function getFullProgressKey() { return `full_progress_${currentFilePath.replace(/[\\/]/g, '_')}`; }
    function getCompletionKey() { return `quiz_completed_${currentFilePath.replace(/[\\/]/g, '_')}`; }
    function getStatsKey() { return `quiz_stats_${currentFilePath.replace(/[\\/]/g, '_')}`; }
    
    function isQuestionCorrect(q, userAns, isChecked) {
        if (!isChecked) return false;
        const type = q.type;
        const options = q.optionList || [];
        const correctIds = options.filter(opt => opt.isRight === "1").map(opt => opt.id);
        if (type === '3') return false;
        if (type === '1') {
            const selected = userAns || [];
            if (!Array.isArray(selected)) return false;
            if (selected.length !== correctIds.length) return false;
            const sortedSelected = [...selected].sort();
            const sortedCorrect = [...correctIds].sort();
            return JSON.stringify(sortedSelected) === JSON.stringify(sortedCorrect);
        } else {
            const selectedId = userAns;
            if (!selectedId) return false;
            return correctIds.length === 1 && correctIds[0] === selectedId;
        }
    }
    
    function saveChapterStats() {
        let total = 0, correct = 0;
        for (let i = 0; i < fullQuestions.length; i++) {
            const q = fullQuestions[i];
            if (q.type === '3') continue;
            total++;
            if (fullAnswerStatus[i] && isQuestionCorrect(q, fullUserAnswers[i], true)) correct++;
        }
        const accuracy = total === 0 ? 0 : (correct/total)*100;
        const chapterStats = { correct, total, accuracy };
        localStorage.setItem(getStatsKey(), JSON.stringify(chapterStats));
    }
    
    function saveAllProgress() {
        if (!currentFilePath || !fullQuestions.length) return;
        const fullData = { fullUserAnswers, fullAnswerStatus };
        localStorage.setItem(getFullProgressKey(), JSON.stringify(fullData));
        const indices = currentQuestions.map(q => fullQuestions.indexOf(q));
        const viewData = { userAnswers: currentUserAnswers, answerStatus: currentAnswerStatus, currentQuestionsIndices: indices };
        localStorage.setItem(getStorageKey(), JSON.stringify(viewData));
        
        let allCompleted = true;
        for (let i = 0; i < fullQuestions.length; i++) {
            const q = fullQuestions[i];
            if (q.type === '3') continue;
            const hasAnswer = (q.type === '1') ? (fullUserAnswers[i] && fullUserAnswers[i].length > 0) : (fullUserAnswers[i] != null);
            const isChecked = fullAnswerStatus[i] === true;
            if (!hasAnswer || !isChecked) { allCompleted = false; break; }
        }
        if (allCompleted && fullQuestions.length > 0) {
            localStorage.setItem(getCompletionKey(), 'true');
            saveChapterStats();
        } else {
            localStorage.removeItem(getCompletionKey());
            localStorage.removeItem(getStatsKey());
        }
        updateCompletionUI();
    }
    
    function loadFullProgress() {
        const savedFull = localStorage.getItem(getFullProgressKey());
        if (savedFull) {
            try {
                const data = JSON.parse(savedFull);
                if (data.fullUserAnswers && data.fullUserAnswers.length === fullQuestions.length) {
                    fullUserAnswers = data.fullUserAnswers;
                    fullAnswerStatus = data.fullAnswerStatus;
                    for (let i = 0; i < fullQuestions.length; i++) {
                        if (fullQuestions[i].type === '1' && (!fullUserAnswers[i] || !Array.isArray(fullUserAnswers[i]))) fullUserAnswers[i] = [];
                    }
                    return true;
                }
            } catch(e) {}
        }
        fullUserAnswers = new Array(fullQuestions.length).fill(null);
        fullAnswerStatus = new Array(fullQuestions.length).fill(false);
        for (let i = 0; i < fullQuestions.length; i++) if (fullQuestions[i].type === '1') fullUserAnswers[i] = [];
        return false;
    }
    
    function syncCurrentFromFull() {
        currentUserAnswers = new Array(currentQuestions.length).fill(null);
        currentAnswerStatus = new Array(currentQuestions.length).fill(false);
        for (let i = 0; i < currentQuestions.length; i++) {
            const idxInFull = fullQuestions.indexOf(currentQuestions[i]);
            if (idxInFull !== -1) {
                let ans = fullUserAnswers[idxInFull];
                if (currentQuestions[i].type === '1') {
                    if (!ans || !Array.isArray(ans)) ans = [];
                    currentUserAnswers[i] = [...ans];
                } else currentUserAnswers[i] = ans;
                currentAnswerStatus[i] = fullAnswerStatus[idxInFull] || false;
            } else {
                if (currentQuestions[i].type === '1') currentUserAnswers[i] = [];
                else currentUserAnswers[i] = null;
                currentAnswerStatus[i] = false;
            }
        }
    }
    
    function syncFullFromCurrent() {
        for (let i = 0; i < currentQuestions.length; i++) {
            const idxInFull = fullQuestions.indexOf(currentQuestions[i]);
            if (idxInFull !== -1) {
                fullUserAnswers[idxInFull] = (currentQuestions[i].type === '1') ? [...(currentUserAnswers[i] || [])] : currentUserAnswers[i];
                fullAnswerStatus[idxInFull] = currentAnswerStatus[i];
            }
        }
        saveAllProgress();
    }
    
    function updateCompletionUI() {
        const completed = localStorage.getItem(getCompletionKey()) === 'true';
        const badge = document.getElementById('completionBadge');
        if (completed && fullQuestions.length > 0) {
            const statsRaw = localStorage.getItem(getStatsKey());
            if (statsRaw) {
                try {
                    const stats = JSON.parse(statsRaw);
                    const acc = Math.round(stats.accuracy);
                    badge.innerHTML = `🏆 ${acc}% 已完成`;
                } catch(e) { badge.innerHTML = `🏆 本章已完成`; }
            } else {
                badge.innerHTML = `🏆 本章已完成`;
            }
            badge.style.display = 'inline-flex';
        } else {
            badge.style.display = 'none';
        }
    }
    
    function computeFullStatistics() {
        let total = 0, answered = 0, correct = 0, incorrect = 0;
        for (let i = 0; i < fullQuestions.length; i++) {
            const q = fullQuestions[i];
            if (q.type === '3') continue;
            total++;
            const hasAnswer = (q.type === '1') ? (fullUserAnswers[i] && fullUserAnswers[i].length > 0) : (fullUserAnswers[i] != null);
            if (hasAnswer) answered++;
            if (fullAnswerStatus[i] && hasAnswer) {
                if (isQuestionCorrect(q, fullUserAnswers[i], true)) correct++;
                else incorrect++;
            }
        }
        const unanswered = total - answered;
        const rate = total === 0 ? 0 : (correct/total)*100;
        return { total, answered, correct, incorrect, unanswered, rate };
    }
    
    function updateStatsDisplay() {
        const stats = computeFullStatistics();
        document.getElementById('totalCount').innerText = stats.total;
        document.getElementById('answeredCount').innerText = stats.answered;
        document.getElementById('correctCount').innerText = stats.correct;
        document.getElementById('incorrectCount').innerText = stats.incorrect;
        document.getElementById('unansweredCount').innerText = stats.unanswered;
        document.getElementById('correctRate').innerHTML = `${Math.round(stats.rate)}%`;
    }
    
    function renderQuiz() {
        const container = document.getElementById('quizContainer');
        if (!currentQuestions.length) {
            container.innerHTML = '<div class="error-box">⚠️ 没有题目。请检查筛选条件或收藏夹是否为空。</div>';
            updateStatsDisplay();
            updateCompletionUI();
            return;
        }
        let html = '';
        currentQuestions.forEach((q, idx) => {
            const qType = q.type;
            const options = q.optionList || [];
            const isMulti = (qType === '1');
            const isRadio = (!isMulti && qType !== '3');
            const userSel = currentUserAnswers[idx] || (isMulti ? [] : null);
            const statusClass = (userSel && (Array.isArray(userSel) ? userSel.length > 0 : userSel !== null)) ? 'answered' : '';
            const statusText = (userSel && (Array.isArray(userSel) ? userSel.length > 0 : userSel !== null)) ? '已回答' : '未答';
            const isCorrectShown = currentAnswerStatus[idx] || false;
            let selectedId = (!isMulti && userSel) ? userSel : null;
            let selectedIds = (isMulti && Array.isArray(userSel)) ? userSel : [];
            const difficultyLabel = getDifficultyLabel(q.difficulty);
            const saved = isQuestionSaved(q.id);
            
            html += `<div class="card" data-qidx="${idx}"><div class="question-header">
                        <span class="tag">${isMulti ? '多选题' : (qType === '3' ? '排序题' : '单选题')}</span>
                        <span class="difficulty-badge">📊 ${difficultyLabel}</span>
                        <div class="question-title">${unescapeHtml(q.content) || '无题目'}</div>
                        <button class="save-btn ${saved ? 'saved' : ''}" data-id="${q.id}" data-savebtn="${idx}">${saved ? '★' : '☆'}</button>
                        <span class="status ${statusClass}">${statusText}</span>
                     </div><div class="options" id="options-${idx}">`;
            if (qType === '3') {
                html += `<div style="background:#fef5e7; padding:12px; border-radius:12px;"><strong>📌 排序题：</strong> 下面列出原有顺序，可参考解析。<br/><ul>`;
                options.forEach((opt, i) => html += `<li>${i+1}. ${unescapeHtml(opt.content)}</li>`);
                html += `</ul></div>`;
                if (isCorrectShown) {
                    let correctOrder = [...options].sort((a,b)=> parseInt(a.isRight)-parseInt(b.isRight)).map(o=>o.content).join(' → ');
                    html += `<div class="analysis"><strong>正确顺序：</strong> ${correctOrder}<br/><strong>解析：</strong> ${unescapeHtml(q.textAnalysis || '无解析')}</div>`;
                }
            } else {
                options.forEach((opt, optIdx) => {
                    const letter = String.fromCharCode(65+optIdx);
                    const isChecked = isMulti ? selectedIds.includes(opt.id) : (selectedId === opt.id);
                    const inputType = isMulti ? 'checkbox' : 'radio';
                    html += `<div class="option"><span class="prefix">${letter}.</span>
                             <input type="${inputType}" name="q${idx}" value="${opt.id}" id="opt_${idx}_${optIdx}" ${isChecked ? 'checked' : ''}>
                             <label for="opt_${idx}_${optIdx}">${unescapeHtml(opt.content)}</label></div>`;
                });
                if (isMulti) html += `<div style="margin-top:12px; text-align:right;"><button class="btn-check" data-idx="${idx}">✓ 核对答案</button></div>`;
                else if (isRadio && !isCorrectShown) html += `<div style="margin-top:12px; text-align:right;"><button class="btn-check" data-idx="${idx}">✓ 核对答案</button></div>`;
                if (isCorrectShown) {
                    const isAnswerCorrect = isQuestionCorrect(q, userSel, true);
                    const correctClass = "correct-answer";
                    const userAnswerClass = isAnswerCorrect ? "your-answer-correct" : "your-answer-incorrect";
                    let correctText = options.filter(o=>o.isRight==="1").map(o=>{let l=String.fromCharCode(65+options.findIndex(x=>x.id===o.id)); return `${l}. ${unescapeHtml(o.content)}`;}).join(' ;  ');
                    let userText = '';
                    if (isMulti) {
                        let selOpts = options.filter(o=>selectedIds.includes(o.id)).map(o=>{let l=String.fromCharCode(65+options.findIndex(x=>x.id===o.id)); return `${l}. ${unescapeHtml(o.content)}`;});
                        userText = selOpts.length ? selOpts.join(' ; ') : '未选任何选项';
                    } else {
                        let selOpt = options.find(o=>o.id===selectedId);
                        userText = selOpt ? `${String.fromCharCode(65+options.findIndex(x=>x.id===selectedId))}. ${unescapeHtml(selOpt.content)}` : '未选';
                    }
                    html += `<div class="feedback">
                                <div class="${correctClass}">✅ 正确答案： ${correctText}</div>
                                <div class="${userAnswerClass}">📝 你的答案： ${userText}</div>
                                <div class="analysis">📖 解析： ${unescapeHtml(q.textAnalysis || '无解析')}</div>
                            </div>`;
                }
            }
            html += `</div></div>`;
        });
        container.innerHTML = html;
        
        document.querySelectorAll('.save-btn').forEach(btn => {
            const qid = btn.getAttribute('data-id');
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (qid) toggleSavedQuestion(qid);
            });
        });
        
        currentQuestions.forEach((q, idx) => {
            if (q.type === '3') return;
            const div = document.getElementById(`options-${idx}`);
            if (!div) return;
            const inputs = div.querySelectorAll('input');
            const isMulti = (q.type === '1');
            const isRadio = (!isMulti && q.type !== '3');
            inputs.forEach(inp => {
                inp.addEventListener('change', () => {
                    if (isMulti) {
                        let cur = currentUserAnswers[idx] || [];
                        if (inp.checked) { if (!cur.includes(inp.value)) cur.push(inp.value); }
                        else { cur = cur.filter(v=>v!==inp.value); }
                        currentUserAnswers[idx] = cur;
                        if (currentAnswerStatus[idx]) currentAnswerStatus[idx] = false;
                        const statusSpan = document.querySelector(`.card[data-qidx="${idx}"] .status`);
                        if (statusSpan) {
                            const has = (currentUserAnswers[idx]?.length > 0);
                            statusSpan.innerText = has ? '已回答' : '未答';
                            if (has) statusSpan.classList.add('answered'); else statusSpan.classList.remove('answered');
                        }
                        syncFullFromCurrent();
                        renderQuiz();
                    } else if (isRadio && inp.checked) {
                        const idxInFull = fullQuestions.indexOf(q);
                        if (idxInFull !== -1 && fullAnswerStatus[idxInFull] === true) {
                            currentUserAnswers[idx] = inp.value;
                            currentAnswerStatus[idx] = true;
                            renderQuiz();
                        } else {
                            currentUserAnswers[idx] = inp.value;
                            currentAnswerStatus[idx] = true;
                            syncFullFromCurrent();
                            renderQuiz();
                        }
                    }
                });
            });
            const btn = document.querySelector(`.btn-check[data-idx="${idx}"]`);
            if (btn) {
                btn.addEventListener('click', () => {
                    if (!currentAnswerStatus[idx]) {
                        currentAnswerStatus[idx] = true;
                        syncFullFromCurrent();
                        renderQuiz();
                    } else if (isMulti) {
                        syncFullFromCurrent();
                        renderQuiz();
                    }
                });
            }
        });
        updateStatsDisplay();
        updateCompletionUI();
        saveAllProgress();
    }
    
    function applyFilters() {
        if (!fullQuestions.length) return;
        let filtered = [...fullQuestions];
        const onlySaved = document.getElementById('onlySavedCheckbox').checked;
        if (onlySaved) {
            const savedIds = loadSavedQuestionIds();
            filtered = filtered.filter(q => savedIds.includes(q.id));
            if (filtered.length === 0) showToast(`⭐ 暂无收藏题目，请先点击题目旁的星星收藏`, 2500);
        }
        const countVal = document.getElementById('questionCountSelect').value;
        if (countVal !== 'all') {
            const limit = parseInt(countVal);
            if (filtered.length > limit) filtered = filtered.slice(0, limit);
        }
        if (document.getElementById('randomizeCheckbox').checked) {
            for (let i=filtered.length-1; i>0; i--) {
                const j = Math.floor(Math.random()*(i+1));
                [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
            }
        }
        currentQuestions = filtered;
        syncCurrentFromFull();
        renderQuiz();
        document.getElementById('settingsPanel').classList.remove('open');
        if (onlySaved && filtered.length) showToast(`📚 当前显示 ${filtered.length} 道收藏题目`, 1500);
        else if (!onlySaved) showToast('✅ 筛选已应用');
    }
    
    function resetProgress() {
        if (!fullQuestions.length) return;
        localStorage.removeItem(getFullProgressKey());
        localStorage.removeItem(getStorageKey());
        localStorage.removeItem(getCompletionKey());
        localStorage.removeItem(getStatsKey());
        fullUserAnswers = new Array(fullQuestions.length).fill(null);
        fullAnswerStatus = new Array(fullQuestions.length).fill(false);
        for (let i=0; i<fullQuestions.length; i++) if (fullQuestions[i].type === '1') fullUserAnswers[i] = [];
        syncCurrentFromFull();
        renderQuiz();
        document.getElementById('settingsPanel').classList.remove('open');
        showToast('🔄 答题进度已重置，但收藏列表保留');
    }
    
    // 主加载
    const urlParams = new URLSearchParams(window.location.search);
    const fileParam = urlParams.get('file');
    if (!fileParam) {
        document.getElementById('quizContainer').innerHTML = '<div class="error-box">❌ 未提供文件参数。</div>';
        document.getElementById('chapterTitle').innerText = '错误';
    } else {
        currentFilePath = decodeURIComponent(fileParam);
        fetch(currentFilePath)
            .then(res => res.json())
            .then(data => {
                const qs = parseJsonContent(data);
                if (!qs || !qs.length) throw new Error('无题目');
                fullQuestions = qs;
                loadFullProgress();
                syncCurrentFromFull();
                applyFilters();
                const displayName = currentFilePath.replace(/\.json$/i,'').split('/').pop();
                const src = getSourceFromPath(currentFilePath);
                document.getElementById('chapterTitle').innerHTML = `${displayName} <span class="source-badge">${src}</span>`;
                let sub = data.parentCategory || data.originalData?.parentCategory || data.data?.chapterName || '';
                document.getElementById('subtitle').innerText = sub ? `📁 ${sub}` : '';
            })
            .catch(err => {
                document.getElementById('quizContainer').innerHTML = `<div class="error-box">❌ 加载失败: ${err.message}</div>`;
                document.getElementById('chapterTitle').innerHTML = `加载失败`;
            });
    }
    
    document.getElementById('settingsToggle').addEventListener('click', ()=>{
        const panel = document.getElementById('settingsPanel');
        if (panel.classList.contains('open')) panel.classList.remove('open');
        else { panel.classList.add('open'); setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'start'}),50); }
    });
    document.getElementById('applySettingsBtn').addEventListener('click', applyFilters);
    document.getElementById('resetProgressBtn').addEventListener('click', resetProgress);
    document.getElementById('clearSavedBtn').addEventListener('click', clearAllSaved);
</script>
</body>
</html>
